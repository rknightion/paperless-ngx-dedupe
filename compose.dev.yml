services:
  app:
    image: paperless-ngx-dedupe:local
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - ./docker-data:/app/data
    env_file:
      - .env
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    healthcheck:
      # Use Node's fetch (no curl in the image) to match the Dockerfile HEALTHCHECK.
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/api/v1/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    stop_grace_period: 30s

  dev:
    profiles: ['dev']
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '${PORT:-5173}:5173'
    volumes:
      - ./packages:/app/packages
      - ./tsconfig.json:/app/tsconfig.json
      - ./docker-data:/app/data
      # Preserve pnpm-installed node_modules from the image (volume mount above overwrites them)
      - /app/packages/core/node_modules
      - /app/packages/web/node_modules
    env_file:
      - .env
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
