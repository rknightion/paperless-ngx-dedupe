name: Release Please

on:
  push:
    branches: [main]

permissions: {} # no workflow-level write; each job grants only what it needs

# Serialize releases on rapid main pushes (don't cancel an in-flight release/publish).
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write # create releases and tags
      pull-requests: write # create/update release PRs
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          # PAT (not GITHUB_TOKEN): bot-authored release PRs need a non-default-token author for CI to run without manual approval
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    uses: ./.github/workflows/publish.yml
    with:
      release_tag: ${{ needs.release-please.outputs.tag_name }}
    secrets:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

  # Edge build on every non-release push to main: publishes the :main multi-arch image
  # (replaces the removed amd64-only ci.yml docker job — now multi-arch).
  edge:
    needs: release-please
    if: needs.release-please.outputs.release_created != 'true'
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    uses: ./.github/workflows/publish.yml
    with:
      release_tag: ""
    secrets:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
