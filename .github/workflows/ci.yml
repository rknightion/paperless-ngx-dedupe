name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  install:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  quality:
    permissions:
      contents: read
    needs: install
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm lint
      - run: pnpm format
      - run: pnpm check
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

  unit-tests:
    needs: install
    runs-on: ubuntu-24.04
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Run unit tests with coverage
        run: |
          pnpm --filter @paperless-dedupe/core exec vitest run --coverage --reporter=default --reporter=junit --outputFile.junit=./test-results/junit.xml
          pnpm --filter @paperless-dedupe/sdk exec vitest run --coverage --reporter=default --reporter=junit --outputFile.junit=./test-results/junit.xml

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: unit-test-results
          path: |
            packages/core/test-results/junit.xml
            packages/sdk/test-results/junit.xml
          retention-days: 7

      - name: Upload coverage reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-reports
          path: |
            packages/core/coverage/
            packages/sdk/coverage/
          retention-days: 7

      - name: Unit test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        with:
          name: Unit Test Results
          path: packages/*/test-results/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

  e2e-tests:
    needs: install
    runs-on: ubuntu-24.04
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT
        working-directory: packages/web

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: packages/web

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: packages/web

      - name: Build packages
        run: |
          pnpm --filter @paperless-dedupe/core build
          pnpm --filter @paperless-dedupe/web build

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 7

      - name: Upload E2E test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: e2e-test-results
          path: packages/web/test-results/junit.xml
          retention-days: 7

      - name: E2E test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        with:
          name: E2E Test Results
          path: packages/web/test-results/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

  coverage-summary:
    needs: unit-tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download coverage reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-reports
          path: coverage

      - name: Core coverage summary
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2
        with:
          json-summary-path: coverage/core/coverage/coverage-summary.json
          json-final-path: coverage/core/coverage/coverage-final.json
          name: Core Package Coverage

      - name: SDK coverage summary
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2
        with:
          json-summary-path: coverage/sdk/coverage/coverage-summary.json
          json-final-path: coverage/sdk/coverage/coverage-final.json
          name: SDK Package Coverage

  docker-build-verify:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: |
            env.OTEL_EXPORTER_OTLP_ENDPOINT=${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
            env.OTEL_EXPORTER_OTLP_HEADERS=${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
            env.OTEL_TRACES_EXPORTER=otlp
            env.OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
            env.OTEL_SERVICE_NAME=paperless-ngx-dedupe-ci
            "env.OTEL_RESOURCE_ATTRIBUTES=ci.pipeline=${{ github.workflow }},ci.run_id=${{ github.run_id }},ci.ref=${{ github.ref_name }}"

      - name: Build Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: false
          load: true
          tags: paperless-dedupe:ci-test
          cache-from: |
            type=gha,scope=build-verify
            type=gha,scope=build-linux-amd64
          cache-to: type=gha,scope=build-verify,mode=max

      - name: Verify container starts and is healthy
        run: |
          docker run -d --name ci-test \
            -p 3000:3000 \
            -e PAPERLESS_URL=http://localhost:8000 \
            -e PAPERLESS_API_TOKEN=test-token \
            paperless-dedupe:ci-test

          # Wait for health check
          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ci-test 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy after ${i}s"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "Container failed to become healthy"
              docker logs ci-test
              exit 1
            fi
            sleep 1
          done

      - name: Cleanup
        if: always()
        run: docker rm -f ci-test 2>/dev/null || true

  source-maps:
    needs: [quality, unit-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Build with source maps
        run: pnpm build
        env:
          FARO_SOURCEMAP_API_KEY: ${{ secrets.FARO_SOURCEMAP_API_KEY }}

      - name: Upload source maps as artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: source-maps
          path: packages/web/build/**/*.map
          retention-days: 90

  docker:
    needs: [quality, unit-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: |
            env.OTEL_EXPORTER_OTLP_ENDPOINT=${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
            env.OTEL_EXPORTER_OTLP_HEADERS=${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
            env.OTEL_TRACES_EXPORTER=otlp
            env.OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
            env.OTEL_SERVICE_NAME=paperless-ngx-dedupe-ci
            "env.OTEL_RESOURCE_ATTRIBUTES=ci.pipeline=${{ github.workflow }},ci.run_id=${{ github.run_id }},ci.ref=${{ github.ref_name }}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}:main
          cache-from: |
            type=gha,scope=build-linux-amd64
            type=gha,scope=build-verify
          cache-to: type=gha,scope=build-linux-amd64,mode=max

      - name: Verify container starts and is healthy
        run: |
          docker run -d --name ci-test \
            -p 3000:3000 \
            -e PAPERLESS_URL=http://localhost:8000 \
            -e PAPERLESS_API_TOKEN=test-token \
            ghcr.io/${{ github.repository }}:main

          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ci-test 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy after ${i}s"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "Container failed to become healthy"
              docker logs ci-test
              exit 1
            fi
            sleep 1
          done

      - name: Cleanup
        if: always()
        run: docker rm -f ci-test 2>/dev/null || true

      - name: Push image
        run: docker push ghcr.io/${{ github.repository }}:main
