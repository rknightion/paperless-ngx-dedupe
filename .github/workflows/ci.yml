name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  install:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  quality:
    permissions:
      contents: read
    needs: install
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm lint
      - run: pnpm format
      - run: pnpm check
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

  unit-tests:
    needs: install
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm

      - name: Run unit tests with coverage
        run: |
          pnpm --filter @paperless-dedupe/core exec vitest run --coverage --reporter=default --reporter=junit --outputFile.junit=./test-results/junit.xml

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-results
          path: |
            packages/core/test-results/junit.xml
          retention-days: 7

      - name: Upload coverage reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: |
            packages/core/coverage/
          retention-days: 7

      # Vitest emits lcov SF: paths relative to packages/core (e.g. src/config.ts). Codacy matches
      # paths relative to the repo root, so rewrite them to packages/core/src/... or coverage stays
      # stuck "Pending" with no file matches.
      - name: Normalize coverage paths for Codacy
        if: ${{ !cancelled() }}
        run: sed -i 's#^SF:src/#SF:packages/core/src/#' packages/core/coverage/lcov.info

      # Send core coverage to Codacy. continue-on-error so a coverage-upload hiccup (or a fork PR
      # without access to the secret) never fails the required unit-tests job / ci-success gate.
      - name: Upload coverage to Codacy
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: packages/core/coverage/lcov.info

      - name: Unit test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        with:
          name: Unit Test Results
          path: packages/*/test-results/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

  e2e-tests:
    needs: install
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT
        working-directory: packages/web

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: packages/web
        run: |
          # The previous "download reaches 100% then hangs until timeout" failures were the Node 24
          # extract-zip bug in Playwright <1.60 (microsoft/playwright#41000), fixed by pinning
          # @playwright/test >=1.61. This retry now only guards against genuine cdn.playwright.dev
          # network flakes; the per-attempt timeout caps any future regression instead of eating the
          # whole 30-min job. One success populates the cache so later runs skip this.
          for attempt in 1 2 3; do
            if timeout 300 npx playwright install --with-deps chromium; then
              echo "Playwright browsers installed (attempt $attempt)"
              exit 0
            fi
            echo "::warning::playwright install attempt $attempt failed; retrying"
            sleep 10
          done
          echo "::error::playwright install failed after 3 attempts"
          exit 1

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: packages/web

      - name: Build packages
        run: |
          pnpm --filter @paperless-dedupe/core build
          pnpm --filter @paperless-dedupe/web build

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 7

      - name: Upload E2E test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-test-results
          path: packages/web/test-results/junit.xml
          retention-days: 7

      - name: E2E test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        with:
          name: E2E Test Results
          path: packages/web/test-results/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

  coverage-summary:
    needs: unit-tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download coverage reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-reports
          path: coverage

      - name: Core coverage summary
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2.12.1
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          name: Core Package Coverage

  docker-build-verify:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver-opts: |
            env.OTEL_EXPORTER_OTLP_ENDPOINT=${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
            env.OTEL_EXPORTER_OTLP_HEADERS=${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
            env.OTEL_TRACES_EXPORTER=otlp
            env.OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
            env.OTEL_SERVICE_NAME=paperless-ngx-dedupe-ci
            "env.OTEL_RESOURCE_ATTRIBUTES=ci.pipeline=${{ github.workflow }},ci.run_id=${{ github.run_id }},ci.ref=${{ github.ref_name }}"

      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: true
          tags: paperless-dedupe:ci-test
          cache-from: |
            type=gha,scope=build-verify
            type=gha,scope=build-linux-amd64
          cache-to: type=gha,scope=build-verify,mode=max

      - name: Verify container starts and is healthy
        run: |
          docker run -d --name ci-test \
            -p 3000:3000 \
            -e PAPERLESS_URL=http://localhost:8000 \
            -e PAPERLESS_API_TOKEN=test-token \
            paperless-dedupe:ci-test

          # Wait for health check
          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ci-test 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy after ${i}s"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "Container failed to become healthy"
              docker logs ci-test
              exit 1
            fi
            sleep 1
          done

      - name: Cleanup
        if: always()
        run: docker rm -f ci-test 2>/dev/null || true

  source-maps:
    needs: install
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-pnpm

      - name: Build with source maps
        run: pnpm build
        env:
          FARO_SOURCEMAP_API_KEY: ${{ secrets.FARO_SOURCEMAP_API_KEY }}

      - name: Upload source maps as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-maps
          path: packages/web/build/**/*.map
          retention-days: 90

  # Single required status check (the branch ruleset requires only this). if: always() + an explicit
  # failure check so a failed/cancelled leg fails the gate; main-only publish jobs aren't depended on,
  # so a PR (where they're skipped) still passes. Renovate automerge waits for this to go green.
  ci-success:
    name: ci-success
    runs-on: ubuntu-24.04
    if: always()
    needs: [quality, unit-tests, e2e-tests, docker-build-verify]
    steps:
      - name: Fail if any required job did not pass
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required job failed or was cancelled: ${{ join(needs.*.result, ', ') }}"
          exit 1
      - name: All required jobs passed
        run: echo "ci-success — ${{ join(needs.*.result, ', ') }}"
